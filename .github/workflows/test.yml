name: Test and Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
    - uses: actions/checkout@v3

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v3
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'pnpm'

    - name: Install pnpm
      run: npm install -g pnpm

    - name: Install dependencies
      run: pnpm install

    - name: Run tests
      run: |
        cd apps/server
        pnpm test
        cd ../..

        cd apps/renderer
        pnpm test
        cd ../..

    - name: Type check
      run: |
        cd apps/server
        pnpm typecheck
        cd ../..

        cd apps/renderer
        pnpm typecheck
        cd ../..

  build:
    needs: test
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Use Node.js 20.x
      uses: actions/setup-node@v3
      with:
        node-version: '20.x'
        cache: 'pnpm'

    - name: Install pnpm
      run: npm install -g pnpm

    - name: Install dependencies
      run: pnpm install

    - name: Build applications
      run: |
        cd apps/server
        pnpm build
        cd ../..

        cd apps/renderer
        pnpm build
        cd ../..

        cd apps/desktop
        pnpm build
        cd ../..

    - name: Upload build artifacts
      uses: actions/upload-artifact@v3
      with:
        name: build-artifacts
        path: |
          apps/server/dist/
          apps/renderer/dist/
          apps/desktop/dist-electron/